<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 15px 30px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.header img {
    height: 50px;
    margin-right: 15px;
}

/* CONTAINER */
.container {
    padding: 30px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    font-weight: bold;
}

/* SECTION */
.section {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

h2 {
    margin-bottom: 15px;
}

/* BAR CHART */
.bar-container {
    margin-bottom: 10px;
}

.bar-label {
    margin-bottom: 5px;
}

.bar {
    height: 20px;
    background: #3498db;
    border-radius: 5px;
}

/* PIE CHART */
.pie {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 20px auto;
}

/* HIGHLIGHT */
.highlight {
    background: #fff3cd;
    padding: 15px;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #c49b3d;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://www.composure.care/wp-content/uploads/2023/11/gsc2-logo.png" style="height: 70px;">
    <div><h1>Reports Dashboard</h1></div>
</div>

<div class="container">

<!-- METRICS -->
<div class="cards">
    <div class="card" id="total">Total: 0</div>
    <div class="card" id="open">Open: 0</div>
    <div class="card" id="progress">In Progress: 0</div>
    <div class="card" id="closed">Closed: 0</div>
</div>

<!-- MOST COMMON ISSUE -->
<div class="section">
    <h2>Most Common Issue</h2>
    <div id="mostCommon" class="highlight">N/A</div>
</div>

<!-- PIE CHART -->
<div class="section">
    <h2>Ticket Status Distribution</h2>
    <div id="pieChart" class="pie"></div>
</div>

<!-- CATEGORY BARS -->
<div class="section">
    <h2>Tickets by Category</h2>
    <div id="categoryChart"></div>
</div>

<!-- PRIORITY BARS -->
<div class="section">
    <h2>Tickets by Priority</h2>
    <div id="priorityChart"></div>
</div>

<button onclick="goBack()">Back to Dashboard</button>

</div>

<script>
let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

// Status counters
let open = 0, progress = 0, closed = 0;

// Data objects
let categories = {};
let priorities = {};

// Process tickets
tickets.forEach(ticket => {
    if (ticket.status === "Open") open++;
    else if (ticket.status === "In Progress") progress++;
    else if (ticket.status === "Closed") closed++;

    categories[ticket.category] = (categories[ticket.category] || 0) + 1;
    priorities[ticket.priority] = (priorities[ticket.priority] || 0) + 1;
});

// Metrics
document.getElementById("total").innerText = "Total: " + tickets.length;
document.getElementById("open").innerText = "Open: " + open;
document.getElementById("progress").innerText = "In Progress: " + progress;
document.getElementById("closed").innerText = "Closed: " + closed;

// MOST COMMON ISSUE
let mostCommon = "N/A";
let maxCount = 0;

for (let key in categories) {
    if (categories[key] > maxCount) {
        maxCount = categories[key];
        mostCommon = key;
    }
}

document.getElementById("mostCommon").innerText = mostCommon + " (" + maxCount + " tickets)";

// BAR CHART FUNCTION
function createBars(data, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    const max = Math.max(...Object.values(data), 1);

    for (let key in data) {
        const value = data[key];
        const width = (value / max) * 100;

        container.innerHTML += `
            <div class="bar-container">
                <div class="bar-label">${key} (${value})</div>
                <div class="bar" style="width:${width}%"></div>
            </div>
        `;
    }
}

// CREATE PIE CHART
function createPie() {
    const total = tickets.length || 1;

    const openPercent = (open / total) * 100;
    const progressPercent = (progress / total) * 100;
    const closedPercent = (closed / total) * 100;

    document.getElementById("pieChart").style.background = `
        conic-gradient(
            #3498db 0% ${openPercent}%,
            #f39c12 ${openPercent}% ${openPercent + progressPercent}%,
            #2ecc71 ${openPercent + progressPercent}% 100%
        )
    `;
}

// Render everything
createBars(categories, "categoryChart");
createBars(priorities, "priorityChart");
createPie();

// Navigation
function goBack() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
